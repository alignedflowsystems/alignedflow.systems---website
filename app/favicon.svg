<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#0a0f1a"/>

  <!-- Subtle grid dots — "Systems" motif -->
  <circle cx="10" cy="10" r="1.2" fill="#0e7490" opacity="0.5"/>
  <circle cx="22" cy="10" r="1.2" fill="#0e7490" opacity="0.5"/>
  <circle cx="10" cy="22" r="1.2" fill="#0e7490" opacity="0.5"/>
  <circle cx="54" cy="42" r="1.2" fill="#0e7490" opacity="0.5"/>
  <circle cx="42" cy="54" r="1.2" fill="#0e7490" opacity="0.5"/>
  <circle cx="54" cy="54" r="1.2" fill="#0e7490" opacity="0.5"/>

  <!-- Flow arc — connects A to F, represents "flow" -->
  <path d="M14 46 Q32 8 50 18" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.35" fill="none"/>

  <!-- Letter A — left side, white/cyan -->
  <!-- Left leg -->
  <line x1="13" y1="46" x2="22" y2="22" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Right leg -->
  <line x1="22" y1="22" x2="31" y2="46" stroke="#f8fafc" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="16.5" y1="37" x2="27.5" y2="37" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>

  <!-- Letter F — right side, cyan accent -->
  <!-- Vertical stem -->
  <line x1="36" y1="21" x2="36" y2="46" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Top bar -->
  <line x1="36" y1="21" x2="51" y2="21" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Mid bar — slightly shorter, golden ratio feel -->
  <line x1="36" y1="33" x2="48" y2="33" stroke="#f8fafc" stroke-width="3" stroke-linecap="round"/>

  <!-- Cyan dot accent — full stop / precision mark -->
  <circle cx="51" cy="46" r="2.5" fill="#22d3ee"/>
</svg>
